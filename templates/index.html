<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>千禧梦 · 构成主义聊天</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='icons/favicon.svg') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Markdown 渲染 + 代码高亮 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>

    <!-- 背景装饰层 -->
    <div class="bg-stripes"></div>
    <div class="radial-ring"></div>

    <!-- ============ 侧边栏（浮动，可折叠） ============ -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="sidebar-title">会话</span>
            <button class="sidebar-close" id="btnNewChat" title="新建会话">＋</button>
        </div>
        <ul class="session-list" id="sessionList">
            <!-- 由 JS 动态渲染 -->
        </ul>
        <div class="sidebar-footer">
            <button class="sidebar-btn" onclick="newSession()">新对话 →</button>
        </div>
    </aside>

    <!-- ============ 主区域（对话 + 桌宠） ============ -->
    <div class="main-layout">

        <!-- 对话面板 -->
        <div class="panel">

            <!-- ============ 顶部栏 ============ -->
            <header class="topbar">
                <div class="topbar-inner">
                    <button class="btn-toggle-sidebar" id="btnToggleSidebar" title="会话列表">
                        <span class="hamburger">
                            <span class="hamburger-line"></span>
                            <span class="hamburger-line"></span>
                            <span class="hamburger-line"></span>
                        </span>
                    </button>
                    <div class="brand">
                        <div class="brand-icon">
                            <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <line x1="20" y1="2" x2="20" y2="10" stroke="#F5F0E6" stroke-width="2.5" stroke-linecap="square"/>
                                <circle cx="20" cy="1" r="2.5" fill="#F5F0E6"/>
                                <rect x="6" y="10" width="28" height="22" rx="0" fill="none" stroke="#F5F0E6" stroke-width="2.5"/>
                                <rect x="12" y="16" width="6" height="6" fill="#F5F0E6"/>
                                <rect x="22" y="16" width="6" height="6" fill="#F5F0E6"/>
                                <line x1="14" y1="28" x2="26" y2="28" stroke="#F5F0E6" stroke-width="2" stroke-linecap="square"/>
                                <rect x="3" y="14" width="5" height="8" fill="none" stroke="#F5F0E6" stroke-width="2"/>
                                <rect x="32" y="14" width="5" height="8" fill="none" stroke="#F5F0E6" stroke-width="2"/>
                            </svg>
                        </div>
                        <div class="brand-text">
                            <h1>千禧梦</h1>
                            <div class="subtitle">M I L L E N N I U M · D R E A M</div>
                        </div>
                    </div>
                    <div class="topbar-geo"></div>
                </div>
                <div class="topbar-stripe"></div>
            </header>

            <!-- ============ 对话区 ============ -->
            <div class="chat-area" id="chatContainer">
                <div class="welcome" id="welcomeMessage">
                    <div class="welcome-icon">
                        <svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <line x1="28" y1="2" x2="28" y2="12" stroke="#D62828" stroke-width="3" stroke-linecap="square"/>
                            <circle cx="28" cy="2" r="3.5" fill="#D62828"/>
                            <rect x="8" y="12" width="40" height="34" rx="0" fill="none" stroke="#1A1A1A" stroke-width="3"/>
                            <rect x="16" y="20" width="8" height="8" fill="#D62828"/>
                            <rect x="32" y="20" width="8" height="8" fill="#D62828"/>
                            <rect x="20" y="36" width="16" height="4" fill="#D62828"/>
                            <rect x="2" y="18" width="8" height="10" fill="none" stroke="#1A1A1A" stroke-width="2.5"/>
                            <rect x="46" y="18" width="8" height="10" fill="none" stroke="#1A1A1A" stroke-width="2.5"/>
                        </svg>
                        <span class="welcome-glitch">▮▯▮</span>
                    </div>
                    <h2>你好，旅行者。</h2>
                    <p>我是千禧梦，一个从像素梦境中苏醒的机器人。<br>在这个数码次元里，聊聊星空屏保、拨号音、<br>和那些被遗忘的比特之光。</p>
                    <div class="welcome-line"></div>
                </div>
            </div>

            <!-- ============ 输入区 ============ -->
            <div class="quick-commands">
                <button class="quick-cmd-btn" id="btnQuickDoc" onclick="toggleQuickCmd('doc')">@生成文档</button>
                <button class="quick-cmd-btn" id="btnQuickPage" onclick="toggleQuickCmd('page')">@网页生成</button>
            </div>
            <div class="input-zone">
                <div class="input-zone-inner">
                    <div class="input-row">
                        <input
                            type="text"
                            class="input-field"
                            id="messageInput"
                            placeholder="输入消息……"
                            autocomplete="off"
                        >
                        <button class="btn btn-send" id="btnSend" onclick="sendMessage()">
                            发送 →
                        </button>
                        <button class="btn btn-stop" id="btnStop" onclick="stopGeneration()">
                            ■ 停止
                        </button>
                    </div>
                    <div class="input-actions">
                        <button class="btn btn-clear" onclick="clearChat()">
                            清空记忆体
                        </button>
                        <span class="input-hint">Enter 发送</span>
                    </div>
                </div>
            </div>

        </div>

        <!-- ============ 桌宠面板 ============ -->
        <aside class="pet-panel" id="petPanel">
            <div class="pet-container">
                <div class="pet-emoji" id="petEmoji"></div>
                <div class="pet-robot" id="petRobot">
                    <!-- SVG 机器人由 JS 动态渲染 -->
                </div>
                <div class="pet-status" id="petStatus">待命中</div>
            </div>
        </aside>

    </div>

    <!-- CRT 扫描线覆盖层 -->
    <div class="crt-overlay" id="crtOverlay"></div>

    <!-- CRT 开机动画 -->
    <div class="crt-boot" id="crtBoot"></div>

    <!-- CRT 切换按钮 -->
    <button class="btn-crt-toggle" id="btnCrtToggle" title="CRT 滤镜">⊞</button>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
